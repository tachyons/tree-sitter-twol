name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write   # needed to create GitHub releases and upload assets

jobs:
  # ----------------------------------------------------------------
  # 1. Generate the parser source and upload as a release artifact
  # ----------------------------------------------------------------
  generate:
    name: Generate parser
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install tree-sitter CLI
        run: npm install -g tree-sitter-cli

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Generate parser
        run: tree-sitter generate

      - name: Run tests
        run: tree-sitter test

      - name: Upload generated src/
        uses: actions/upload-artifact@v4
        with:
          name: generated-src
          path: src/
          retention-days: 1

  # ----------------------------------------------------------------
  # 2. Build native Node.js prebuilds for each platform/arch
  # ----------------------------------------------------------------
  prebuild:
    name: Prebuild (${{ matrix.os }} / ${{ matrix.arch }})
    needs: generate
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            runner: ubuntu-latest
            arch: x64
          - os: linux
            runner: ubuntu-latest
            arch: arm64
          - os: darwin
            runner: macos-latest
            arch: x64
          - os: darwin
            runner: macos-latest
            arch: arm64
          - os: win32
            runner: windows-latest
            arch: x64

    steps:
      - uses: actions/checkout@v4

      - name: Download generated src/
        uses: actions/download-artifact@v4
        with:
          name: generated-src
          path: src/

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set up QEMU (Linux arm64 cross-compile)
        if: matrix.os == 'linux' && matrix.arch == 'arm64'
        uses: docker/setup-qemu-action@v3

      - name: Build prebuild
        run: npx prebuildify --napi --strip --arch ${{ matrix.arch }}
        env:
          npm_config_arch: ${{ matrix.arch }}

      - name: Upload prebuilds
        uses: actions/upload-artifact@v4
        with:
          name: prebuilds-${{ matrix.os }}-${{ matrix.arch }}
          path: prebuilds/
          retention-days: 1

  # ----------------------------------------------------------------
  # 3. Build the Rust crate and publish to crates.io
  # ----------------------------------------------------------------
  publish-crate:
    name: Publish to crates.io
    needs: generate
    runs-on: ubuntu-latest
    if: ${{ vars.PUBLISH_CRATE == 'true' }}

    steps:
      - uses: actions/checkout@v4

      - name: Download generated src/
        uses: actions/download-artifact@v4
        with:
          name: generated-src
          path: src/

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish
        run: cargo publish --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # ----------------------------------------------------------------
  # 4. Publish the npm package
  # ----------------------------------------------------------------
  publish-npm:
    name: Publish to npm
    needs: prebuild
    runs-on: ubuntu-latest
    if: ${{ vars.PUBLISH_NPM == 'true' }}

    steps:
      - uses: actions/checkout@v4

      - name: Download generated src/
        uses: actions/download-artifact@v4
        with:
          name: generated-src
          path: src/

      - name: Download all prebuilds
        uses: actions/download-artifact@v4
        with:
          pattern: prebuilds-*
          path: prebuilds/
          merge-multiple: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Publish
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ----------------------------------------------------------------
  # 5. Create GitHub Release with source tarball + all prebuilds
  # ----------------------------------------------------------------
  github-release:
    name: GitHub Release
    needs: prebuild
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download generated src/
        uses: actions/download-artifact@v4
        with:
          name: generated-src
          path: src/

      - name: Download all prebuilds
        uses: actions/download-artifact@v4
        with:
          pattern: prebuilds-*
          path: prebuilds/
          merge-multiple: true

      - name: Create source tarball
        run: |
          tar -czf tree-sitter-twol-${{ needs.generate.outputs.version }}.tar.gz \
            grammar.js tree-sitter.json queries/ src/ bindings/ \
            Cargo.toml CMakeLists.txt binding.gyp Package.swift \
            Makefile go.mod LICENSE README.md 2>/dev/null || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "tree-sitter-twol ${{ github.ref_name }}"
          generate_release_notes: true
          files: |
            tree-sitter-twol-${{ needs.generate.outputs.version }}.tar.gz
            prebuilds/**
